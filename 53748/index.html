<!DOCTYPE html>
<html>
<head>
  <title>Little Panda Candy Shop</title>
    <style>
            html{width:100%; height:100%; overflow:hidden; }
            body{width:100%; height:100%; overflow:hidden;margin: 0;padding: 0;background-color: rgb(0, 84, 124);}
            canvas { outline: none; }
    </style>
    <meta charset="utf-8"/>
    <link rel='canonical' href='https://www.yiv.com/games/Little-Panda-Candy-Shop/index.html' />


    <style>
      /* 隐藏所有广告容器 */
      #imaContainer,
      #imaContainer_new,
      #sdk__advertisement,
      #gmLoadingText,
      iframe[src*="imasdk"],
      iframe[src*="doubleclick"],
      iframe[src*="googlesyndication"],
      iframe[title="Advertisement"],
      div[id*="google_ads"],
      div[id*="aswift"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
    </style>
    <script>
      // 定期清除动态插入的广告元素
      setInterval(function() {
        var adSelectors = [
          '#imaContainer',
          '#imaContainer_new', 
          '#sdk__advertisement',
          '#gmLoadingText',
          'iframe[src*="imasdk"]',
          'iframe[src*="doubleclick"]',
          'iframe[src*="googlesyndication"]',
          'iframe[title="Advertisement"]',
          'div[id*="google_ads"]',
          'div[id*="aswift"]'
        ];
        
        adSelectors.forEach(function(selector) {
          var elements = document.querySelectorAll(selector);
          elements.forEach(function(el) {
            if (el && el.parentNode) {
              el.parentNode.removeChild(el);
            }
          });
        });

        // 阻止广告SDK函数
        if (window.sdk_init) window.sdk_init = function() {};
        if (window.sdk) window.sdk = { showBanner: function() {}, requestAd: function() {} };
        if (window.adBreak) window.adBreak = function() {};
        if (window.adConfig) window.adConfig = function() {};
      }, 500);
    </script>

  </head>
<body>   
    <canvas id="gameCanvas" width="1920px" height="1080px"></canvas>
    <script type="text/javascript" src="https://h5gamessdk.yyggames.com/sdk/YYGGames.js"></script>
    <script type="text/javascript" src="JS/Game.js" charset="UTF-8"></script>
    <script type="text/javascript">
        cc.loader.loadImg("RES/COM/bb_icon_200x150.png");
        comman.GameName="Little Panda Candy Shop";
        comman.GameId="Little-Panda-Candy-Shop";
    </script>
<script type="text/javascript">
    window["YYGGAMES_CONFIG"] = {

    }
</script>

</body>
</html>
