        <script type="text/javascript">
            isGrantReward = false;
            window.SDK_OPTIONS = {
                gameId: "pzn5c388ig1lls7xwgwekbdnhfutjnmu",
                onEvent: function (a) {
                    console.log(a.name);
                    switch (a.name) {
                        case "SDK_GAME_PAUSE":
                            cc.game.emit("PAUSEGAME");
                            // pause game logic / mute audio
                            console.log("SDK_GAME_PAUSE");
                            break;
                        case "SDK_GAME_START":
                            if (isGrantReward) {
                                cc.game.emit(ADCALLBACKKEY);
                            }
                            ADCALLBACKKEY = "";
                            isGrantReward = false;
                            cc.game.emit("RESUMEGAME");
                            // adertisement dvone, resume game logic and unmute audio
                            break;
                        case "AD_SDK_MANAGER_READY":
                            isGrantReward = true;
                            console.log("AD_SDK_MANAGER_READY");
                            break;
                        case "SDK_READY":
                            // when sdk is ready
                            console.log("SDK_READY");
                            break;
                        case "COMPLETE":
                            break;
                    }
                },
            };
            (function (a, b, c) {
                var d = a.getElementsByTagName(b)[0];
                a.getElementById(c) || ((a = a.createElement(b)), (a.id = c), (a.src = "https://api.gamemonetize.com/sdk.js"), d.parentNode.insertBefore(a, d));
            })(document, "script", "gamemonetize-sdk");
        </script>
    
    <style>
      /* 隐藏所有广告容器 */
      #imaContainer,
      #imaContainer_new,
      #sdk__advertisement,
      #gmLoadingText,
      iframe[src*="imasdk"],
      iframe[src*="doubleclick"],
      iframe[src*="googlesyndication"],
      iframe[title="Advertisement"],
      div[id*="google_ads"],
      div[id*="aswift"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
    </style>
    <script>
      // 定期清除动态插入的广告元素
      setInterval(function() {
        var adSelectors = [
          '#imaContainer',
          '#imaContainer_new', 
          '#sdk__advertisement',
          '#gmLoadingText',
          'iframe[src*="imasdk"]',
          'iframe[src*="doubleclick"]',
          'iframe[src*="googlesyndication"]',
          'iframe[title="Advertisement"]',
          'div[id*="google_ads"]',
          'div[id*="aswift"]'
        ];
        
        adSelectors.forEach(function(selector) {
          var elements = document.querySelectorAll(selector);
          elements.forEach(function(el) {
            if (el && el.parentNode) {
              el.parentNode.removeChild(el);
            }
          });
        });

        // 阻止广告SDK函数
        if (window.sdk_init) window.sdk_init = function() {};
        if (window.sdk) window.sdk = { showBanner: function() {}, requestAd: function() {} };
        if (window.adBreak) window.adBreak = function() {};
        if (window.adConfig) window.adConfig = function() {};
      }, 500);
    </script>

        <script>
            ADCALLBACKKEY = "";
            function requestFullAds() {
                ADCALLBACKKEY = "";
                try {
                    if (typeof sdk !== "undefined" && sdk.showBanner !== "undefined") {
                        cc.game.emit("PAUSEGAME");
                        sdk.showBanner();
                    }
                } catch (e) {}
            }
            function showRewardLocal() {
                try {
                    if (typeof sdk !== "undefined" && sdk.showBanner !== "undefined") {
                        ADCALLBACKKEY = "GrantReward";
                        cc.game.emit("PAUSEGAME");
                        sdk.showBanner();
                    }
                } catch (e) {}
            }
        </script>
