    <link rel="shortcut icon" href="https://www.babygames.com/favicon.ico" type="image/x-icon">
    <script type="text/javascript" src="https://h5gamessdk.yyggames.com/sdk/YYGGames.js" data-adapter="laya"
        data-channel="babygames">
        </script>
    <script src="https://h5gamessdk.yyggames.com/sdk/h5splash.js"></script>
	<script src="https://h5gamessdk.yyggames.com/sdk/laya/2.11.0beta/laya.core.js"></script>
	<script src="https://h5gamessdk.yyggames.com/sdk/laya/2.11.0beta/laya.d3.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        @font-face {
            font-family: "Arial";
            src: url("JingNanBoBoHei-Bold-3.ttf");
        }

        html {
            touch-action: none
        }

        body {
            cursor: default;
            overflow: 'hidden';
            background: #adffe7
        }

        div {
            text-align: center;
        }
    </style>
</head>

<body>
    
    <script type="text/javascript">
        // YYGGames.showReward = YYGGames.showInterstitial = function (e) { e && e() }
        console.e = function () {
            const options = []
            const colors = []
            for (const it of arguments) {
                options.push("%c", it);
                colors.push("color: #ffffff; background: #8f4ef1")
            }
            console.error.apply(this, [options.join(" "), ...colors]);
        }
        const keysToBlockWhenFramed = [32, 33, 34, 35, 36, 37, 38, 39, 40, 44];
        document.addEventListener('keydown', function (info) {
            if (window != window.top && keysToBlockWhenFramed.indexOf(info.which) > -1) {
                info.preventDefault();
                info.stopPropagation();
            }
        }, true)
        document.addEventListener("mousedown", function () {
            window.focus();
        }, true);
        document.addEventListener("touchstart", function () {
            window.focus();
        }, true);

        document.addEventListener('gesturestart', function (event) {
            var event = event || window.event
            if (typeof event.preventDefault != 'undefined') {
                event.preventDefault();
            } else {
                event.returnValue = false;
            }
        });
        function loadLib(url) {
            var script = document.createElement("script");
            script.async = false;
            script.src = url;
            document.body.appendChild(script);
        }
    </script>
    <script>
        h5splash.init({ appName: "DIY-Slime-Simulator-ASMR", channel: "babygames" });
        h5splash.setBackgroundColor("#adffe7");
    </script>
    <script type="text/javascript" src="index.js"></script>
</body>

</html>
