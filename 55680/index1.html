	<style>
		body {
			margin: 0;
			padding: 0;
		}

		#game {
			margin: 0;
			padding: 0;
			position: absolute;
			width: 100%;

			background: black;
		}
	</style>

<body>

	<div id="game"></div>



	<script type="text/javascript">

		/////GameDistribution API start

		window["SDK_OPTIONS"] = {
			"gameId": "m9bozq3pg2vywfq8mlgupk8sf9ceosl7",
			"onEvent": function (event) {
				switch (event.name) {
					case "SDK_GAME_START":


						BasicGame.adshowing = false;
						BasicGame.paused = false;
						//	if (BasicGame.soundbtnclicks == false) {

						//	if (BasicGame.soundplay == 1) {
						//	console.log(BasicGame.soundplay, "soundssssss")
						BasicGame.music.play();
						BasicGame.soundplay = 0;
						//}
						//}


						break;
					case "SDK_GAME_PAUSE":
						console.log("pause", BasicGame.soundplay)
						BasicGame.paused = true;
						BasicGame.adshowing = true;
						//if (BasicGame.sound == 0) {
						///console.log(",mmmm")
						BasicGame.music.pause();
						console.log(BasicGame.soundplay, "sound")
						BasicGame.sound = 1;
						//}
						break;
					case "SDK_READY":
						console.log("SDK_READY", BasicGame.soundplay)
						break;
				}
			},
		};
		(function (a, b, c) {
			var d = a.getElementsByTagName(b)[0];
			a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
		})(document, "script", "gamemonetize-sdk");






		//	Create your Phaser game and inject it into the game div.
		//	We did it in a window.onload event, but you can do it anywhere (requireJS load, anonymous function, jQuery dom ready, - whatever floats your boat)
		//	We're using a game size of 1024 x 768 here, but you can use whatever you feel makes sense for your game of course.
		var game = new Phaser.Game(540, 960, Phaser.CANVAS, 'game');
		//	document.getElementById('overlay').style.display = "none";

		//	Add the States your game has.
		//	You don't have to do this in the html, it could be done in your Boot state too, but for simplicity I'll keep it here.
		game.state.add('Boot', BasicGame.Boot);
		game.state.add('Preloader', BasicGame.Preloader);
		game.state.add('MainMenu', BasicGame.MainMenu);
		game.state.add('Game', BasicGame.Game);
		game.state.add('Gameover', BasicGame.Gameover);
		game.state.add('Levelup', BasicGame.Levelup);
		game.state.add('Gamewon', BasicGame.Gamewon);

		//	Now start the Boot state.
		game.state.start('Boot');
	</script>
