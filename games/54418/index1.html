<!DOCTYPE html>
<html lang="en-us">

<head>
	<meta charset='utf-8' />
	<meta name='renderer' content='webkit' />
	<meta name='viewport'
		content='width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no' />
		
		<link rel="icon" href="favicon.ico" />
	<meta name='apple-mobile-web-app-capable' content='yes' />
	<meta name='full-screen' content='true' />
	<meta name='x5-fullscreen' content='true' />
	<meta name='360-fullscreen' content='true' />
	<meta name='laya' screenorientation='landscape' />
	<meta http-equiv='expires' content='0' />
	<meta http-equiv='X-UA-Compatible' content='IE=edge,chrome=1' />
	<meta http-equiv='expires' content='0' />
	<meta http-equiv='Cache-Control' content='no-siteapp' />
	<title>Left or Right: Women Fashions</title>
	<style>
		@font-face {
			font-family: "Arial";
			src: url("rrzzhh.ttf");
		}

		* {
			margin: 0;
			padding: 0;
			overflow: hidden;
		}

		body {
			overflow: 'hidden';
			/* 页面背景颜色 */
			background: #fcc2ff
		}

		#unity-container {
			z-index: 1000;
			background: #fcc2ff;
			position: absolute;
			overflow: hidden;
		}

		#LoadingView {
			position: absolute;
			left: 50%;
			top: 50%;
			height: 100%;
			width: 100%;
			overflow: hidden;
			transform: translate(-50%, -50%);

			text-align: center;
		}

		#top-container {
			flex: 0;
			display: flex;
			flex-direction: column;
			align-items: center;
			/* 距离顶部位置 */
			margin-top: 10%;
		}

		#progress {
			flex: 0;
			display: flex;
			flex-direction: column;
			align-items: center;
			position: absolute;
			bottom: 10%;
		}

		div {
			text-align: center;
		}
	</style>
	<script type="text/javascript" src="https://h5gamessdk.yyggames.com/sdk/YYGGames.js" data-adapter="laya"
		data-channel="babygames"></script>
		
	<!-- <script type="text/javascript" src="libs/htmlfs.js"></script> -->
</head>

<body>
	

	<script>
		console.log = console.info = console.warn = console.error =function () { };

		const keysToBlockWhenFramed = [32, 33, 34, 35, 36, 37, 38, 39, 40, 44];
		document.addEventListener('keydown', function (info) {
			if (window != window.top && keysToBlockWhenFramed.indexOf(info.which) > -1) {
				info.preventDefault();
				info.stopPropagation();
			}
		}, true)
		document.addEventListener("mousedown", function () {
			window.focus();
		}, true);
		document.addEventListener("touchstart", function () {
			window.focus();
		}, true);

		//游戏加载时关闭触控
		document.addEventListener('gesturestart', function (event) {
			event.preventDefault()
		})


		function loadLib(url) {
			var script = document.createElement("script");
			script.async = false;
			script.src = url;
			document.body.appendChild(script);
		}
	</script>
	
	<!-- 引类库 -->
	<script type="text/javascript" src="./libs/min/laya.core.min.js"></script>

	<script type="text/javascript" src="https://h5gamessdk.yyggames.com/sdk/laya/2.13.1/laya.ui.js"></script>

	<script type="text/javascript" src="https://h5gamessdk.yyggames.com/sdk/laya/2.13.1/laya.d3.js"></script>
	<script type="text/javascript" src="https://h5gamessdk.yyggames.com/sdk/laya/2.13.1/laya.physics3D.js"></script>

	<!-- <script type="text/javascript" src="https://h5gamessdk.yyggames.com/sdk/laya/2.13.0/laya.particle.js"></script> -->



	<script src="https://h5gamessdk.yyggames.com/sdk/h5splash.js"></script>
	<script>
	   //'puzzlegame'
	   //'yad'
	   //初始化渠道
		h5splash.init({ appName: "Left-Or-Right-Women-Fashions", channel: "babygames" })
	   //设置背景颜色
	   h5splash.setBackgroundColor("#fcc2ff")
	   //设置进度条背景颜色
	   //h5splash.setProgressBackgroundColor("#fffff")
	   //这是进度条颜色
	   h5splash.setProgressValueColor("#fff")
	   //这是进度条颜色 渐变色
	   //h5splash.setProgressValueColor("#fffff","#ddd")

	   h5splash.setGameLogoScale(.7,.7)
	</script>


	<script type="text/javascript" src="index.js"></script>

</body>

</html>
